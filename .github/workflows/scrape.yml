name: Scrape FIFA World Cup 2026

on:
  schedule:
    # Every 10 minutes during World Cup hours (12:00-23:59 UTC)
    - cron: '*/10 12-23 * * *'
    # Every 30 minutes overnight
    - cron: '*/30 0-11 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run scraper
        run: node src/scraper.js --yt

      - name: Deploy API to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api
          keep_files: false
          user_name: 'fifa-wc-bot'
          user_email: 'bot@fifa-wc-2026-api'
          commit_message: 'Update match data [skip ci]'
          enable_jekyll: false
