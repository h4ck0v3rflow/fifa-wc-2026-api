name: Scrape FIFA World Cup 2026

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run scraper
        run: node src/scraper.js --yt

      - name: Deploy API to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'fifa-wc-bot'
          user_email: 'bot@fifa-wc-2026-api'
          commit_message: 'Update match data [skip ci]'
          enable_jekyll: false
